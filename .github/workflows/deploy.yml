name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
    build:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Write vercel.json for deploy branch (skip build, serve dist as root)
        run: |
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
            c.buildCommand = 'echo Pre-built by GitHub Actions — no build step.';
            c.installCommand = 'echo No install needed.';
            c.outputDirectory = '.';
            fs.writeFileSync('dist/vercel.json', JSON.stringify(c, null, 2));
          "

      - name: Push built files to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          force_orphan: true
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
